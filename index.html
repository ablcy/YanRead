<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YanRead - 阅读推荐</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">📖 YanRead</a>
            <div class="nav-links">
                <a href="index.html" class="active">书单推荐</a>
                <a href="about.html">关于</a>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>YanRead</h1>
            <p>精选阅读推荐，发现好书与新知</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索书名、作者或分类..." oninput="filterBooks()">
            </div>
        </section>

        <section class="categories" id="categories">
            <button class="cat-btn active" data-cat="all" onclick="filterCategory('all')">全部</button>
            <button class="cat-btn" data-cat="文学小说" onclick="filterCategory('文学小说')">文学小说</button>
            <button class="cat-btn" data-cat="科技前沿" onclick="filterCategory('科技前沿')">科技前沿</button>
            <button class="cat-btn" data-cat="商业经管" onclick="filterCategory('商业经管')">商业经管</button>
            <button class="cat-btn" data-cat="人文社科" onclick="filterCategory('人文社科')">人文社科</button>
            <button class="cat-btn" data-cat="心理成长" onclick="filterCategory('心理成长')">心理成长</button>
        </section>

        <section class="books-grid" id="booksGrid"></section>
    </main>

    <footer>
        <p>© 2026 YanRead · <a href="https://github.com/ablcy/YanRead" target="_blank">GitHub</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
