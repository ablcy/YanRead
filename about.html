<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YanRead - 关于</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">📖 YanRead</a>
            <div class="nav-links">
                <a href="index.html">书单推荐</a>
                <a href="about.html" class="active">关于</a>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
                <span class="theme-icon">🌙</span>
            </button>
        </div>
    </nav>

    <main class="container about-page">
        <h1>关于 YanRead</h1>
        <div class="about-content">
            <p>YanRead 是一个精选阅读推荐网站，致力于为你发现值得阅读的好书。</p>
            <h2>分类</h2>
            <ul>
                <li>📚 <strong>文学小说</strong> — 经典与现代文学作品</li>
                <li>💻 <strong>科技前沿</strong> — 技术、AI、互联网趋势</li>
                <li>💼 <strong>商业经管</strong> — 创业、管理、投资思维</li>
                <li>🌍 <strong>人文社科</strong> — 历史、哲学、社会学</li>
                <li>🧠 <strong>心理成长</strong> — 心理学、个人成长</li>
            </ul>
            <h2>技术</h2>
            <p>纯静态网站，无需后端服务。部署在 GitHub Pages。</p>
            <h2>作者</h2>
            <p><a href="https://github.com/ablcy" target="_blank">LuckYan</a> · 爱好阅读与编程</p>
        </div>
    </main>

    <footer>
        <p>© 2026 YanRead · <a href="https://github.com/ablcy/YanRead" target="_blank">GitHub</a></p>
    </footer>

    <script>
        const saved = localStorage.getItem('yanread-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelector('.theme-icon').textContent = saved === 'dark' ? '🌙' : '☀️';
        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('yanread-theme', t);
            document.querySelector('.theme-icon').textContent = t === 'dark' ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
